<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hospital Management System</title>
  <style>
    :root {
      --background-color: #f4f4f4;
      --text-color: #333;
      --header-background: linear-gradient(to right, #0A84FF, #00C897);
      --header-text-color: #ffffff;
      --button-background: #007bff;
      --button-text-color: #ffffff;
      --section-background: rgba(255, 255, 255, 0.95);
    }

    [data-theme="night"] {
      --background-color: #121212;
      --text-color: #f1f1f1;
      --header-background: linear-gradient(to right, #1A1A2E, #1f1c18);
      --header-text-color: #ffffff;
      --button-background: #5cb85c;
      --button-text-color: #ffffff;
      --section-background: rgba(30, 30, 30, 0.95);
    }

    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
    }

    header {
  position: relative; /* important for positioning elements */
  background: var(--header-background);
  color: var(--header-text-color);
  padding: 20px;
  text-align: center;
}

header h1 {
      padding: 30px 20px;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
      url('https://media.istockphoto.com/id/638377134/photo/doctor-man-with-stethoscope-in-hospital.jpg?s=2048x2048&w=is&k=20&c=wmTKy8oac1j4PfFnJxCO-7TBho4R2lNlWzMm0Rl1gvs=') center/cover no-repeat;
     
      color: #ffffff;
      font-weight: 600;
      font-size: 2.3rem;
      border-radius: 10px;
      margin-bottom: 20px;
}

    nav {
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.85);
  padding: 10px 0;
  width: 100%;
}

nav ul {
  list-style: none;
  padding: 0;
  text-align: center;
  max-width: 1100px;
  margin: auto;
}

nav ul li {
  display: inline-block;
  margin: 0 15px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  color: #ffcc00;
}

    main {
      padding: 20px;
       max-width: 1100px;
       margin: auto;
    }

    section {
      background: var(--section-background);
      margin: 20px 0;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    h2 {
      color: var(--header-background);
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #35424a;
      color: #fff;
      font-size: 0.9rem;
    }

   .button, #theme-toggle, #lang-toggle {
  display: inline-block;
  padding: 10px 20px;
  margin: 5px;
  background-color: var(--button-background);
  color: var(--button-text-color);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 500;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}

.button:hover, #theme-toggle:hover, #lang-toggle:hover {
  background-color: #0056b3;
  transform: translateY(-3px);
}


    #controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      nav ul li {
        display: block;
        margin: 10px 0;
      }
      #controls {
        flex-direction: column;
      }
    }

    /* ===== SEARCH BOX MODERN UI ===== */
.search-box {
  display: flex;
  justify-content: center;
  margin: 30px 0;
}

.search-box form {
  display: flex;
  width: 60%;
  max-width: 600px;
}

.search-box input {
  flex: 1;
  padding: 12px;
  border-radius: 25px 0 0 25px;
  border: 1px solid #ccc;
}

.search-box button {
  padding: 12px 20px;
  border-radius: 0 25px 25px 0;
  border: none;
  background: #0A84FF;
  color: white;
  cursor: pointer;
}

/* ===== DOCTOR CARD UPGRADE ===== */
.doctor-card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin: 15px 0;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.doctor-card:hover {
  transform: translateY(-8px);
}

/* ===== RESULT GRID ===== */
#result {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

#google_translate_element {
      position: absolute;
      top: 10px;
      right: 10px;
    }
.hero {
  height: 30vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("https://images.pexels.com/photos/8460157/pexels-photo-8460157.jpeg");
  background-size: cover;
  background-position: center;
  color: white;
  border-radius: 10px;
  margin-bottom: 20px;
  
}
#controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}


  </style>
</head>

<body>
  <header>
  <div class="header-inner">
    <h1 id="main-title"> 🏥 Hospital Management System</h1>
    <div id="google_translate_element"></div>
    <nav>
      <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html" class="active">Services</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="patient-portal.html">Patient Portal</a></li>
                <li><a href="about.html">About Us</a></li>      
    </ul>
    </nav>
    <button id="theme-toggle" class="button">🌙</button>
  </div>
  </header>

  <section class="hero">
  <div class="hero-content">
    <h1>Find the Right Doctor</h1>
    <p>Search by doctor name, specialty, or hospital</p>
  </div>
</section>

  <main>

 <!-- Search Form -->
  <div class="search-box">
  <form action="services.html" method="GET">
    <input type="text" name="query" placeholder="🔍 Search doctors, specialties..." required>
    <button type="submit">Search</button>
  </form>
</div>

  <div id="result">
    <!-- Doctor results will be shown here -->
  </div>

</main>

<script>
  // Helper to get ?query= from URL
  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  const query = getQueryParam('query');
  const resultContainer = document.getElementById('result');

  const doctors = [
    { name: "Dr. Rp yadav", specialty: "Cardiologist", fee: "₹800", time: "10am - 2pm" },
    { name: "Dr. vikash gupta", specialty: "Orthopedic", fee: "₹600", time: "11am - 3pm" },
    { name: "Dr. Meena", specialty: "Gynecologist", fee: "₹700", time: "9am - 1pm" },
    { name: "Dr. Arora", specialty: "Neurologist", fee: "₹1000", time: "12pm - 4pm" },
    { name: "Dr. Khan", specialty: "Dermatologist", fee: "₹500", time: "10am - 1pm" }
  ];

  if (query && query.trim() !== "") {
    const filtered = doctors.filter(doc =>
      doc.name.toLowerCase().includes(query.toLowerCase()) ||
      doc.specialty.toLowerCase().includes(query.toLowerCase())
    );

    if (filtered.length > 0) {
      filtered.forEach(doc => {
        resultContainer.innerHTML += `
          <div class="doctor-card">
            <h3>${doc.name}</h3>
            <p><strong>Specialty:</strong> ${doc.specialty}</p>
            <p><strong>Consultation Fee:</strong> ${doc.fee}</p>
            <p><strong>Available Time:</strong> ${doc.time}</p>
          </div>
        `;
      });
    } else {
      resultContainer.innerHTML = "<p>No doctor found for this search.</p>";
    }
  } else {
    resultContainer.innerHTML = "<p>Please use the search box above to find a doctor.</p>";
  }
</script>

  <footer>
    <p>&copy; 2026 Hospital Management System. All rights reserved.</p>
  </footer>



<!-- ✅ Google Translate Script -->
<script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement(
      { pageLanguage: 'en' },
      'google_translate_element'
    );
  }
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script src="theme.js"></script>
</body>
</html>
