<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
  body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
  .login-box { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.2); width: 300px; }
  input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; }
  button { width: 100%; padding: 10px; margin-top: 20px; border: none; border-radius: 6px; background: #e63946; color: #fff; cursor: pointer; }
  button:hover { background: #b71c1c; }
</style>
</head>
<body>

<div class="login-box">
  <h2>Admin Login</h2>
  <form id="adminLoginForm">
    <label for="adminEmail">Email</label>
    <input type="email" id="adminEmail" required>
    
    <label for="adminPass">Password</label>
    <input type="password" id="adminPass" required>
    
    <button type="submit">Login</button>
  </form>
</div>
<script>
document.getElementById("adminLoginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const email = document.getElementById("adminEmail").value;
    const password = document.getElementById("adminPass").value;

    try{
        const res = await fetch("https://hms-backend-hfaw.onrender.com/api/auth/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        const data = await res.json();

        if(!data.ok){
            alert(data.message || "Invalid credentials");
            return;
        }

        if(data.user.role !== "admin"){
            alert("Access denied. Admin only.");
            return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.user.role);
        localStorage.setItem("loggedInUser", JSON.stringify(data.user));

        alert("Admin login successful!");
        window.location.href="admin-portal.html";

    }catch(err){
        console.error(err);
        alert("Server error");
    }
});
</script>
</body>
</html>
